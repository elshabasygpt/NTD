<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Article – NUTD Automotive Parts</title>
    <!-- Dynamic Meta Tags Placed Here -->
    <meta id="meta-desc" name="description" content="Read the latest article from NUTD Automotive Parts." />
    <meta id="og-title" property="og:title" content="Article – NUTD Automotive Parts" />
    <meta id="og-desc" property="og:description" content="Read the latest article from NUTD Automotive Parts." />
    <meta id="og-image" property="og:image" content="https://nutd.example.com/img/logo.svg" />
    <meta id="og-url" property="og:url" content="" />
    <meta property="og:type" content="article" />
    <meta name="twitter:card" content="summary_large_image" />

    <link rel="icon" type="image/svg+xml" href="img/favicon.svg" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        .article-hero {
            position: relative;
            height: 60vh;
            min-height: 400px;
            display: flex;
            align-items: flex-end;
            padding-bottom: 40px;
            background: #000;
            margin-top: var(--nav-h);
            overflow: hidden;
        }
        .article-hero-img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.6;
        }
        .article-hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(0deg, rgba(0,0,0,1) 0%, rgba(0,0,0,0.5) 50%, rgba(0,0,0,0.2) 100%);
        }
        .article-hero-content {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            text-align: center;
        }
        
        .article-title {
            color: white;
            font-size: 2.8rem;
            font-weight: 800;
            line-height: 1.3;
            margin-bottom: 20px;
        }
        
        .article-meta {
            color: var(--gray-400);
            font-size: 0.95rem;
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
        }
        .article-cat {
            background: var(--red);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .article-container {
            max-width: 800px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .article-content {
            font-size: 1.15rem;
            line-height: 1.8;
            color: var(--gray-200);
        }
        
        /* Semantic adjustements */
        .article-content {
            font-size: 1.15rem;
            line-height: 1.8;
            color: var(--gray-200);
        }
        
        .article-content p {
            margin-bottom: 24px;
        }
        .article-content h2, .article-content h3 {
            color: white;
            margin-top: 40px;
            margin-bottom: 16px;
        }
        .article-content img {
            max-width: 100%;
            border-radius: 8px;
            margin: 32px 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .article-content a {
            color: var(--red);
            text-decoration: underline;
        }
        .article-content ul, .article-content ol {
            margin-bottom: 24px;
            padding-left: 24px;
        }
        .lang-ar .article-content ul, .lang-ar .article-content ol {
            padding-left: 0; padding-right: 24px;
        }
        .article-content blockquote {
            border-left: 4px solid var(--red);
            padding: 16px 24px;
            background: rgba(255,255,255,0.02);
            font-style: italic;
            font-size: 1.25rem;
            margin: 32px 0;
            border-radius: 0 8px 8px 0;
        }
        .lang-ar .article-content blockquote {
            border-left: none;
            border-right: 4px solid var(--red);
            border-radius: 8px 0 0 8px;
        }

        .share-row {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-top: 60px;
            padding-top: 30px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .share-btn {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: var(--dark-3);
            color: white;
            display: flex; align-items: center; justify-content: center;
            transition: 0.2s;
            cursor: pointer;
            text-decoration: none;
        }
        .share-btn:hover { background: var(--red); transform: translateY(-3px); box-shadow: 0 5px 15px rgba(232,35,26,0.4); }

        @media(max-width: 768px) {
            .article-title { font-size: 2rem; }
            .article-content { font-size: 1.05rem; }
        }
    </style>
</head>
<body>

    <!-- ============================== NAVBAR ============================== -->
    <nav class="navbar" id="navbar">
        <div class="container">
            <a href="index.html" class="nav-logo">
                <img src="img/logo.svg" alt="NUTD Logo" style="height:36px" />
                <div class="nav-logo-text">
                    <span class="name-en">NUTD</span>
                    <span class="name-ar">نماء المتحدة</span>
                </div>
            </a>
            <ul class="nav-links">
                <li><a href="index.html" class="nav-link" data-en="Home" data-ar="الرئيسية">Home</a></li>
                <li><a href="catalog.html" class="nav-link" data-en="Products" data-ar="المنتجات">Products</a></li>
                <li><a href="brands.html" class="nav-link" data-en="Brands" data-ar="العلامات">Brands</a></li>
                <li><a href="about.html" class="nav-link" data-en="About" data-ar="عن الشركة">About</a></li>
                <li><a href="media.html" class="nav-link active" data-en="News & Media" data-ar="الأخبار والميديا">News & Media</a></li>
                <li><a href="contact.html" class="nav-link" data-en="Contact" data-ar="تواصل">Contact</a></li>
                <li><a href="warranty.html" class="nav-link" data-en="Warranty" data-ar="الضمان">Warranty</a></li>
            </ul>
            <div class="nav-actions">
                <div class="lang-toggle">
                    <button onclick="setLang('en')" class="active" id="btn-en">EN</button>
                    <button onclick="setLang('ar')" id="btn-ar">AR</button>
                </div>
            </div>
            <button class="nav-hamburger" aria-label="Menu">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <div id="loader" style="height: 100vh; display:flex; align-items:center; justify-content:center;">
        <i class="fa fa-spinner fa-spin text-red" style="font-size:3rem"></i>
    </div>

    <div id="articleWrapper" style="display:none;">
        <header class="article-hero">
            <img src="" id="heroThumb" class="article-hero-img" alt="Article Cover">
            <div class="article-hero-overlay"></div>
            <div class="article-hero-content">
                <span class="article-cat" id="artCategory">News</span>
                <h1 class="article-title" id="artTitle">Loading...</h1>
                <div class="article-meta">
                    <span id="artDate"><i class="fa fa-calendar-alt"></i> --</span>
                    <span id="artViews"><i class="fa fa-eye"></i> --</span>
                </div>
            </div>
        </header>

        <main class="article-container">
            <div id="artVideoWrapper" style="margin-bottom: 40px; display:none; border-radius: 8px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5);"></div>
            <article class="article-content" id="artContent"></article>

            <div class="share-row">
                <span data-en="Share Article: " data-ar="شارك المقال: " style="font-weight:600">Share Article:</span>
                <a href="#" class="share-btn"><i class="fab fa-facebook-f"></i></a>
                <a href="#" class="share-btn"><i class="fab fa-twitter"></i></a>
                <a href="#" class="share-btn"><i class="fab fa-linkedin-in"></i></a>
                <a href="#" class="share-btn"><i class="fab fa-whatsapp"></i></a>
            </div>
            
            <div style="margin-top: 60px; text-align:center;">
                <a href="media.html" class="btn btn-outline">
                    <i class="fa fa-arrow-left"></i> <span data-en="Back to News" data-ar="العودة للأخبار">Back to News</span>
                </a>
            </div>
        </main>
    </div>


    <!-- ============================== FOOTER ============================== -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <span data-en="© 2026 Nama United Trading & Distribution." data-ar="© 2026 نماء المتحدة للتجارة والتوزيع.">© 2026 Nama United Trading & Distribution.</span>
            </div>
        </div>
    </footer>

    <!-- ============================== SCRIPTS ============================== -->
    <script src="js/shared.js"></script>
    <script>
        let articleData = null;

        window.addEventListener('languageChanged', (e) => {
            renderArticle();
        });

        async function fetchArticle() {
            const params = new URLSearchParams(window.location.search);
            const slug = params.get('slug');
            if(!slug) { window.location.href = 'media.html'; return; }

            try {
                const res = await fetch(`http://localhost:5000/api/articles/${slug}`);
                const json = await res.json();
                if(json.success) {
                    articleData = json.data;
                    document.title = (currentLang==='ar'?articleData.titleAr:articleData.titleEn) + ' - NUTD';
                    
                    injectSEOData(articleData);

                    renderArticle();
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('articleWrapper').style.display = 'block';
                } else {
                    document.getElementById('loader').innerHTML = `<h3 class='text-white' style='text-align:center'>${currentLang==='ar'?'المقال غير موجود':'Article not found'}</h3><br><a href='media.html' class='btn btn-primary'>العودة / Back</a>`;
                }
            } catch(e) {
                console.error(e);
            }
        }

        function injectSEOData(data) {
            const t = currentLang === 'ar' ? data.titleAr : data.titleEn;
            const ex = currentLang === 'ar' ? data.excerptAr : data.excerptEn;
            const img = data.thumbnail || 'https://nutd.example.com/img/logo.svg';
            const url = window.location.href;

            document.getElementById('meta-desc').content = ex;
            document.getElementById('og-title').content = t;
            document.getElementById('og-desc').content = ex;
            document.getElementById('og-image').content = img;
            document.getElementById('og-url').content = url;

            // Generate JSON-LD Schema
            const schema = {
                "@context": "https://schema.org",
                "@type": "NewsArticle",
                "headline": t,
                "image": [ img ],
                "datePublished": new Date(data.createdAt).toISOString(),
                "author": [{
                    "@type": "Organization",
                    "name": "NUTD",
                    "url": "https://nutd.example.com"
                }],
                "publisher": {
                    "@type": "Organization",
                    "name": "Nama United Trading & Distribution",
                    "logo": {
                        "@type": "ImageObject",
                        "url": "https://nutd.example.com/img/logo.svg"
                    }
                },
                "description": ex
            };

            const script = document.createElement('script');
            script.type = "application/ld+json";
            script.text = JSON.stringify(schema);
            document.head.appendChild(script);
        }

        function renderArticle() {
            if(!articleData) return;

            const t = currentLang === 'ar' ? articleData.titleAr : articleData.titleEn;
            const c = currentLang === 'ar' ? articleData.contentAr : articleData.contentEn;
            const d = new Date(articleData.createdAt).toLocaleDateString(currentLang==='ar'?'ar-EG':'en-US', { day:'numeric', month:'long', year:'numeric' });
            
            const catMap = {
                'Company News': currentLang==='ar' ? 'أخبار الشركة' : 'Company News',
                'Campaigns': currentLang==='ar' ? 'حملات ترويجية' : 'Campaigns',
                'Events': currentLang==='ar' ? 'فعاليات' : 'Events',
                'Store Visits': currentLang==='ar' ? 'زيارات ميدانية' : 'Store Visits',
            };

            document.getElementById('artTitle').textContent = t;
            document.getElementById('heroThumb').src = articleData.thumbnail || 'https://picsum.photos/1920/1080';
            document.getElementById('artCategory').textContent = catMap[articleData.category] || articleData.category;
            document.getElementById('artDate').innerHTML = `<i class="fa fa-calendar-alt"></i> ${d}`;
            document.getElementById('artViews').innerHTML = `<i class="fa fa-eye"></i> ${articleData.views}`;
            
            // Video handling
            const vidWrap = document.getElementById('artVideoWrapper');
            if(articleData.videoUrl) {
                vidWrap.style.display = 'block';
                if(articleData.videoUrl.includes('youtube.com') || articleData.videoUrl.includes('youtu.be')) {
                    // Extract Video ID
                    let vidId = '';
                    if(articleData.videoUrl.includes('youtube.com/watch?v=')) {
                        vidId = articleData.videoUrl.split('v=')[1].split('&')[0];
                    } else if(articleData.videoUrl.includes('youtu.be/')) {
                        vidId = articleData.videoUrl.split('youtu.be/')[1].split('?')[0];
                    }
                    if(vidId) {
                        vidWrap.innerHTML = `<iframe width="100%" height="450" src="https://www.youtube.com/embed/${vidId}" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>`;
                    } else {
                        vidWrap.style.display = 'none';
                    }
                } else {
                    // Assume direct video file (mp4, webm uploaded to our server)
                    vidWrap.innerHTML = `<video width="100%" height="auto" controls style="display:block;background:#000;">
                        <source src="${articleData.videoUrl}" type="video/mp4">
                        Your browser does not support the video tag.
                    </video>`;
                }
            } else {
                vidWrap.style.display = 'none';
            }
            
            document.getElementById('artContent').innerHTML = c;
            
            // Fix dynamically injected content alignment for RTL
            if(currentLang === 'ar') {
                document.getElementById('artContent').style.textAlign = 'right';
                document.getElementById('artContent').setAttribute('dir', 'rtl');
            } else {
                document.getElementById('artContent').style.textAlign = 'left';
                document.getElementById('artContent').setAttribute('dir', 'ltr');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            fetchArticle();
        });
    </script>
</body>
</html>
