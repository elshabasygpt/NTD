<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Products – Admin Portal</title>
    <link rel="icon" type="image/svg+xml" href="../img/favicon.svg" />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        .sidebar { background: #0c0c0c; border-right: 1px solid rgba(232, 35, 26, 0.3); }
        .sidebar-link.active, .sidebar-link:hover { background: rgba(232, 35, 26, 0.1); border-left: 3px solid var(--red); color: var(--red); }
        .sidebar-link.active .icon, .sidebar-link:hover .icon { color: var(--red); }
        .img-preview { width: 60px; height: 60px; object-fit: cover; border-radius: var(--r-md); background: #111; }
        .upload-area { border: 2px dashed rgba(255,255,255,0.2); padding: 20px; text-align: center; border-radius: var(--r-md); cursor: pointer; transition: 0.3s; }
        .upload-area:hover { border-color: var(--red); background: rgba(232,35,26,0.05); }
    </style>
</head>
<body>

    <div class="portal-layout">
        <!-- =========== SIDEBAR =========== -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <img src="../img/logo.svg" alt="NUTD" style="height:32px" />
                <span style="color:var(--red); font-weight:800; padding:0 8px; font-size:1.1rem;">ADMIN</span>
            </div>

            <nav class="sidebar-nav">
                <div class="sidebar-section-label" data-en="Management" data-ar="الإدارة">Management</div>
                <a href="dashboard.html" class="sidebar-link">
                    <span class="icon"><i class="fa fa-gauge"></i></span>
                    <span data-en="Overview" data-ar="نظرة عامة">Overview</span>
                </a>
                <a href="dealers.html" class="sidebar-link">
                    <span class="icon"><i class="fa fa-users"></i></span>
                    <span data-en="Manage Dealers" data-ar="إدارة الوكلاء">Manage Dealers</span>
                </a>
                <a href="orders.html" class="sidebar-link">
                    <span class="icon"><i class="fa fa-list-check"></i></span>
                    <span data-en="Approve Orders" data-ar="اعتماد الطلبات">Approve Orders</span>
                    <span class="badge" id="adminPendingBadge" data-en="New" data-ar="جديد" style="background:var(--warning);">New</span>
                </a>
                <a href="products.html" class="sidebar-link active">
                    <span class="icon"><i class="fa fa-boxes-stacked"></i></span>
                    <span data-en="Manage Products" data-ar="إدارة المنتجات">Manage Products</span>
                </a>
                <a href="articles.html" class="sidebar-link">
                    <span class="icon"><i class="fa fa-newspaper"></i></span>
                    <span data-en="Manage News & Media" data-ar="إدارة الأخبار والميديا">Manage News & Media</span>
                </a>
                
                <div class="sidebar-section-label" data-en="System" data-ar="النظام">System</div>
                <a href="settings.html" class="sidebar-link">
                    <span class="icon"><i class="fa fa-gear"></i></span>
                    <span data-en="Site Settings" data-ar="إعدادات الموقع">Site Settings</span>
                </a>
            </nav>
        </aside>

        <!-- =========== MAIN CONTENT =========== -->
        <main class="portal-main">
            <!-- TOP BAR -->
            <div class="portal-topbar">
                <div>
                    <span class="topbar-title" data-en="Manage Products" data-ar="إدارة المنتجات">Manage Products</span>
                </div>
                <div class="topbar-actions">
                    <div class="lang-toggle">
                        <button onclick="setLang('en')" class="active" id="btn-en">EN</button>
                        <button onclick="setLang('ar')" id="btn-ar">AR</button>
                    </div>
                </div>
            </div>

            <!-- PORTAL CONTENT -->
            <div class="portal-content">
                <div style="display: flex; justify-content: space-between; margin-bottom: 20px; align-items: center;">
                    <div class="search-box glass-panel" style="display:flex; align-items:center; padding: 8px 16px; border-radius: var(--r-md); width: 300px;">
                        <i class="fa fa-search text-muted"></i>
                        <input type="text" id="searchInput" placeholder="Search SKU or Name..." style="background:transparent; border:none; outline:none; color:white; margin-left:10px; width:100%;" onkeyup="filterProducts()">
                    </div>
                    <button class="btn btn-primary" onclick="openProductModal()" data-en="+ Add Product" data-ar="+ إضافة منتج">+ Add Product</button>
                </div>

                <div class="table-wrap glass-panel">
                    <table class="orders-table">
                        <thead>
                            <tr>
                                <th>Image</th>
                                <th data-en="SKU" data-ar="الكود">SKU</th>
                                <th data-en="Name" data-ar="الاسم">Name</th>
                                <th data-en="Brand" data-ar="العلامة التجارية">Brand</th>
                                <th data-en="Stock" data-ar="المخزون">Stock</th>
                                <th data-en="Price" data-ar="السعر">Price</th>
                                <th style="width: 100px;"></th>
                            </tr>
                        </thead>
                        <tbody id="productsTbody">
                            <tr><td colspan="7" style="text-align:center;">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Product Editor Modal -->
    <div class="modal-overlay" id="productModal">
        <div class="modal" style="max-width: 600px;">
            <div class="modal-header">
                <h3 id="modalTitle" data-en="Add Product" data-ar="إضافة منتج">Add Product</h3>
                <button class="close-btn" onclick="closeModal()"><i class="fa fa-times"></i></button>
            </div>
            <div class="modal-body" style="padding: 24px;">
                <input type="hidden" id="editProductId" value="">
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                    <div>
                        <label style="display:block; margin-bottom:8px; font-size:0.85rem; color:var(--gray-300)" data-en="SKU *" data-ar="الكود المرجعي *">SKU *</label>
                        <input type="text" id="p_sku" class="form-control" placeholder="e.g. BSG-4401">
                    </div>
                    <div>
                        <label style="display:block; margin-bottom:8px; font-size:0.85rem; color:var(--gray-300)" data-en="Brand *" data-ar="العلامة *">Brand *</label>
                        <input type="text" id="p_brand" class="form-control" placeholder="e.g. Borsching">
                    </div>
                    <div>
                        <label style="display:block; margin-bottom:8px; font-size:0.85rem; color:var(--gray-300)" data-en="Name (EN) *" data-ar="الاسم (إنجليزي) *">Name (EN) *</label>
                        <input type="text" id="p_nameEn" class="form-control" placeholder="Brake Pad">
                    </div>
                    <div>
                        <label style="display:block; margin-bottom:8px; font-size:0.85rem; color:var(--gray-300)" data-en="Name (AR) *" data-ar="الاسم (عربي) *">Name (AR) *</label>
                        <input type="text" id="p_nameAr" class="form-control" placeholder="تيل فرامل">
                    </div>
                    <div>
                        <label style="display:block; margin-bottom:8px; font-size:0.85rem; color:var(--gray-300)">
                            <span data-en="Category *" data-ar="القسم *">Category *</span>
                            <a href="#" onclick="openCategoriesModal(); return false;" style="float:right; color:var(--red); text-decoration:none;" data-en="(Manage)" data-ar="(إدارة الأقسام)">(Manage)</a>
                        </label>
                        <select id="p_category" class="form-control">
                            <!-- JS Generated -->
                        </select>
                    </div>
                    <div>
                        <label style="display:block; margin-bottom:8px; font-size:0.85rem; color:var(--gray-300)" data-en="Stock Limit" data-ar="الكمية المتاحة المخزون">Stock</label>
                        <input type="number" id="p_stock" class="form-control" value="0">
                    </div>
                    <div>
                        <label style="display:block; margin-bottom:8px; font-size:0.85rem; color:var(--gray-300)" data-en="Wholesale Price (EGP) *" data-ar="سعر الجملة *">Wholesale Price *</label>
                        <input type="number" id="p_price" class="form-control">
                    </div>
                    <div>
                        <label style="display:block; margin-bottom:8px; font-size:0.85rem; color:var(--gray-300)" data-en="Retail Price (EGP)" data-ar="سعر التجزئة">Retail Price</label>
                        <input type="number" id="p_retailPrice" class="form-control">
                    </div>

                    <div style="grid-column: 1 / -1; margin-top: 16px; margin-bottom: 8px; font-weight: 600; color:var(--white)" data-en="Technical Specifications" data-ar="المواصفات الفنية">Technical Specifications</div>
                    
                    <div>
                        <label style="display:block; margin-bottom:8px; font-size:0.85rem; color:var(--gray-300)" data-en="Type (EN)" data-ar="النوع (إنجليزي)">Type (EN)</label>
                        <input type="text" id="p_typeEn" class="form-control" placeholder="e.g. Gas-Pressurized">
                    </div>
                    <div>
                        <label style="display:block; margin-bottom:8px; font-size:0.85rem; color:var(--gray-300)" data-en="Type (AR)" data-ar="النوع (عربي)">Type (AR)</label>
                        <input type="text" id="p_typeAr" class="form-control" placeholder="e.g. أنبوب بضغط الغاز">
                    </div>
                    <div>
                        <label style="display:block; margin-bottom:8px; font-size:0.85rem; color:var(--gray-300)" data-en="Position (EN)" data-ar="الموضع (إنجليزي)">Position (EN)</label>
                        <input type="text" id="p_positionEn" class="form-control" placeholder="e.g. Front Right">
                    </div>
                    <div>
                        <label style="display:block; margin-bottom:8px; font-size:0.85rem; color:var(--gray-300)" data-en="Position (AR)" data-ar="الموضع (عربي)">Position (AR)</label>
                        <input type="text" id="p_positionAr" class="form-control" placeholder="e.g. أمامي أيمن">
                    </div>
                    <div>
                        <label style="display:block; margin-bottom:8px; font-size:0.85rem; color:var(--gray-300)" data-en="OEM Ref" data-ar="رقم المُصنِّع">OEM Ref</label>
                        <input type="text" id="p_oemRef" class="form-control" placeholder="e.g. 48520-02190">
                    </div>
                    <div>
                        <label style="display:block; margin-bottom:8px; font-size:0.85rem; color:var(--gray-300)" data-en="Warranty (EN)" data-ar="الضمان (إنجليزي)">Warranty (EN)</label>
                        <input type="text" id="p_warrantyEn" class="form-control" placeholder="e.g. 24 Months">
                    </div>
                    <div>
                        <label style="display:block; margin-bottom:8px; font-size:0.85rem; color:var(--gray-300)" data-en="Warranty (AR)" data-ar="الضمان (عربي)">Warranty (AR)</label>
                        <input type="text" id="p_warrantyAr" class="form-control" placeholder="e.g. 24 شهراً">
                    </div>
                    <div>
                        <label style="display:block; margin-bottom:8px; font-size:0.85rem; color:var(--gray-300)" data-en="Origin (EN)" data-ar="بلد المنشأ (إنجليزي)">Origin (EN)</label>
                        <input type="text" id="p_originEn" class="form-control" placeholder="e.g. Germany">
                    </div>
                    <div>
                        <label style="display:block; margin-bottom:8px; font-size:0.85rem; color:var(--gray-300)" data-en="Origin (AR)" data-ar="بلد المنشأ (عربي)">Origin (AR)</label>
                        <input type="text" id="p_originAr" class="form-control" placeholder="e.g. ألمانيا">
                    </div>

                    <div style="grid-column: 1 / -1; background: rgba(255,255,255,0.02); padding: 16px; border-radius: var(--r-md); border: 1px solid rgba(255,255,255,0.05);">
                        <label style="display:block; margin-bottom:12px; font-size:0.9rem; color:var(--white)">
                            <span data-en="Supported Vehicles (Compatibility)" data-ar="السيارات المتوافقة (قاعدة البيانات)">Supported Vehicles (Compatibility)</span>
                            <a href="#" onclick="openVehiclesModal(); return false;" style="float:right; color:var(--red); text-decoration:none;" data-en="(Manage Database)" data-ar="(تحديث قاعدة البيانات)">(Manage Database)</a>
                        </label>
                        <div style="display: flex; gap: 8px; margin-bottom: 12px;">
                            <select id="p_vMake" class="form-control" onchange="loadModelsForMake()"><option value="">Select Make</option></select>
                            <select id="p_vModel" class="form-control" onchange="loadYearsForModel()"><option value="">Select Model</option></select>
                            <input type="number" id="p_vYearFrom" class="form-control" placeholder="From (من)" style="min-width: 90px;">
                            <input type="number" id="p_vYearTo" class="form-control" placeholder="To (إلى)" style="min-width: 90px;">
                            <button type="button" class="btn btn-outline" style="color:var(--success); border-color:var(--success);" onclick="addVehicleToProduct()"><i class="fa fa-plus"></i></button>
                        </div>
                        <div id="p_vehiclesList" style="display: flex; gap: 8px; flex-wrap: wrap;">
                            <!-- Tag badges here -->
                        </div>
                    </div>
                </div>

                <div style="margin-top:20px;">
                    <label style="display:block; margin-bottom:8px; font-size:0.85rem; color:var(--gray-300)" data-en="Upload Image" data-ar="رفع صورة المشهد">Upload Image</label>
                    <label class="upload-area" for="p_image" style="display:block">
                        <i class="fa fa-cloud-arrow-up" style="font-size:2rem; color:var(--gray-500); margin-bottom:10px;"></i>
                        <p style="margin:0; font-size:0.9rem;" id="fileNameDisplay" data-en="Click to browse" data-ar="اضغط لتحديد مسار الصورة">Click to browse or drag file here</p>
                        <input type="file" id="p_image" style="display:none" accept="image/*" onchange="document.getElementById('fileNameDisplay').textContent = this.files[0]?.name || 'Click to browse'">
                    </label>
                </div>
            </div>
            <div class="modal-footer" style="display: flex; gap:12px;">
                <button class="btn btn-primary" style="flex:1;" onclick="saveProduct()" id="btnSave" data-en="Save Product" data-ar="حفظ المنتج">Save Product</button>
                <button class="btn btn-ghost" style="flex:1;" onclick="closeModal()" data-en="Cancel" data-ar="إلغاء">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Category Management Modal -->
    <div class="modal-overlay" id="categoriesModal">
        <div class="modal" style="max-width: 500px;">
            <div class="modal-header">
                <h3 data-en="Manage Categories" data-ar="إدارة الأقسام">Manage Categories</h3>
                <button class="close-btn" onclick="closeCategoriesModal()"><i class="fa fa-times"></i></button>
            </div>
            <div class="modal-body" style="padding: 24px;">
                <div style="display: flex; gap: 8px; margin-bottom: 20px;">
                    <input type="text" id="newCatEn" class="form-control" placeholder="Name (EN) e.g. Lighting" style="flex:1;">
                    <input type="text" id="newCatAr" class="form-control" placeholder="الاسم (AR) e.g. إضاءة" style="flex:1;" dir="rtl">
                    <button class="btn btn-primary" onclick="addCategory()"><i class="fa fa-plus"></i></button>
                </div>
                <div class="table-wrap glass-panel" style="max-height: 250px; overflow-y:auto;">
                    <table class="orders-table" style="margin:0;">
                        <tbody id="catsTbody">
                            <tr><td style="text-align:center"><i class="fa fa-spinner fa-spin"></i></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="modal-footer" style="display: flex; gap:12px;">
                <button class="btn btn-ghost" style="flex:1;" onclick="closeCategoriesModal()" data-en="Close" data-ar="إغلاق">Close</button>
            </div>
        </div>
    </div>

    <!-- Vehicles Management Modal -->
    <div class="modal-overlay" id="vehiclesModal">
        <div class="modal" style="max-width: 650px;">
            <div class="modal-header">
                <h3 data-en="Manage Vehicles Database" data-ar="إدارة قاعدة بيانات السيارات">Manage Vehicles Database</h3>
                <button class="close-btn" onclick="closeVehiclesModal()"><i class="fa fa-times"></i></button>
            </div>
            <div class="modal-body" style="padding: 24px;">
                <form id="newVehicleForm" onsubmit="submitNewVehicle(event)" style="background: rgba(255,255,255,0.02); padding: 16px; border-radius: var(--r-md); border: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px;">
                    <input type="hidden" id="nvVehicleId" value="">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px;">
                        <div>
                            <label style="font-size:0.75rem;color:var(--gray-500);margin-bottom:4px;display:block;">Make (English) *</label>
                            <input type="text" id="nvMake" list="existingMakesList" class="form-control" placeholder="e.g. Volkswagen" required>
                            <datalist id="existingMakesList"></datalist>
                        </div>
                        <div>
                            <label style="font-size:0.75rem;color:var(--gray-500);margin-bottom:4px;display:block;">Make (Arabic)</label>
                            <input type="text" id="nvMakeAr" class="form-control" placeholder="مثال: فولكس فاجن" dir="rtl">
                        </div>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px;">
                        <div>
                            <label style="font-size:0.75rem;color:var(--gray-500);margin-bottom:4px;display:block;">Model (English) *</label>
                            <input type="text" id="nvModel" class="form-control" placeholder="e.g. Golf" required>
                        </div>
                        <div>
                            <label style="font-size:0.75rem;color:var(--gray-500);margin-bottom:4px;display:block;">Model (Arabic)</label>
                            <input type="text" id="nvModelAr" class="form-control" placeholder="مثال: جولف" dir="rtl">
                        </div>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px;">
                        <div>
                            <label style="font-size:0.75rem;color:var(--gray-500);margin-bottom:4px;display:block;"><span data-en="From Year" data-ar="من سنة (بداية الموديل)">From Year</span></label>
                            <input type="number" id="nvYearFrom" class="form-control" placeholder="e.g. 1998" min="1950" max="2100">
                        </div>
                        <div>
                            <label style="font-size:0.75rem;color:var(--gray-500);margin-bottom:4px;display:block;"><span data-en="To Year" data-ar="إلى سنة (نهاية الموديل)">To Year</span></label>
                            <input type="number" id="nvYearTo" class="form-control" placeholder="e.g. 2009" min="1950" max="2100">
                        </div>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px;">
                        <div>
                            <label style="font-size:0.8rem;color:var(--gray-400);display:block;margin-bottom:4px;" data-en="Make Logo (Optional)" data-ar="شعار الشركة (اختياري)">Make Logo (Optional)</label>
                            <input type="file" id="nvMakeLogo" class="form-control" accept="image/*" style="font-size: 0.8rem;">
                        </div>
                        <div>
                            <label style="font-size:0.8rem;color:var(--gray-400);display:block;margin-bottom:4px;" data-en="Model Image (Optional)" data-ar="صورة الموديل (اختياري)">Model Image (Optional)</label>
                            <input type="file" id="nvModelImage" class="form-control" accept="image/*" style="font-size: 0.8rem;">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full" id="btnAddVehicle"><i class="fa fa-plus"></i> <span data-en="Add Vehicle" data-ar="إضافة السيارة" id="btnAddVehicleText">Add Vehicle</span></button>
                    <button type="button" class="btn btn-ghost btn-full" id="btnCancelEditVehicle" style="display:none; margin-top:8px;" onclick="cancelEditVehicle()" data-en="Cancel Edit" data-ar="إلغاء التعديل">Cancel Edit</button>
                </form>

                <div class="table-wrap glass-panel" style="max-height: 250px; overflow-y:auto;">
                    <table class="orders-table" style="margin:0;">
                        <thead>
                            <tr>
                                <th>Logo</th>
                                <th>Make</th>
                                <th>Model</th>
                                <th>Years</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="vehiclesTbody">
                            <tr><td colspan="5" style="text-align:center"><i class="fa fa-spinner fa-spin"></i></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="modal-footer" style="display: flex; gap:12px;">
                <button class="btn btn-ghost" style="flex:1;" onclick="closeVehiclesModal()" data-en="Close" data-ar="إغلاق">Close</button>
            </div>
        </div>
    </div>

    <script>
        let currentLang = localStorage.getItem('lang') || 'en';
        let allProducts = [];
        let globalCategories = [];

        function setLang(lang) {
            currentLang = lang;
            localStorage.setItem('lang', lang);
            document.documentElement.lang = lang;
            document.body.classList.toggle('lang-ar', lang === 'ar');
            document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
            document.getElementById('btn-ar').classList.toggle('active', lang === 'ar');
            document.querySelectorAll('[data-en]').forEach(el => {
                const t = el.getAttribute('data-' + lang);
                if (t) el.innerHTML = t;
            });
            renderProducts(); // re-render text
        }

        async function fetchProducts() {
            try {
                const res = await fetch('http://localhost:5000/api/products');
                const json = await res.json();
                if(json.success) {
                    allProducts = json.data;
                    renderProducts();
                }
                
                // Fetch categories
                const catRes = await fetch('http://localhost:5000/api/settings');
                const catJson = await catRes.json();
                if(catJson.success && catJson.data && catJson.data.product_categories) {
                    globalCategories = catJson.data.product_categories;
                } else {
                    globalCategories = [
                        { id: 'cat1', en: 'Brakes', ar: 'فرامل' },
                        { id: 'cat2', en: 'Filters', ar: 'فلاتر' },
                        { id: 'cat3', en: 'Engine', ar: 'محرك' },
                        { id: 'cat4', en: 'Suspension', ar: 'عفشة' },
                        { id: 'cat5', en: 'Accessories', ar: 'كماليات' }
                    ];
                }
                renderCategoryDropdown();
                
                // Pending badge for sidebars
                const ordRes = await fetch('http://localhost:5000/api/orders?status=Pending');
                const ordJson = await ordRes.json();
                if(ordJson.success) {
                    document.getElementById('adminPendingBadge').textContent = ordJson.data.length;
                }
            } catch(e) {
                console.error(e);
            }
        }

        function filterProducts() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            renderProducts(term);
        }

        function renderProducts(filterTerm = '') {
            const tbody = document.getElementById('productsTbody');
            const data = allProducts.filter(p => {
                if(!filterTerm) return true;
                return (p.sku && p.sku.toLowerCase().includes(filterTerm)) ||
                       (p.nameEn && p.nameEn.toLowerCase().includes(filterTerm)) ||
                       (p.nameAr && p.nameAr.toLowerCase().includes(filterTerm));
            });

            if(data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" style="text-align:center">No products found.</td></tr>`;
                return;
            }

            tbody.innerHTML = data.map(p => {
                const name = currentLang === 'ar' ? (p.nameAr || p.nameEn) : (p.nameEn || p.nameAr);
                const imgSrc = p.imageUrl ? `http://localhost:5000/uploads/${p.imageUrl}` : '../img/placeholder.jpg';
                return `
                <tr>
                    <td><img src="${imgSrc}" class="img-preview" onerror="this.src='../img/placeholder.jpg'"></td>
                    <td class="text-white fw-700">${p.sku}</td>
                    <td>${name}</td>
                    <td>${p.brand || '--'}</td>
                    <td>${p.stock}</td>
                    <td class="text-white fw-700">EGP ${p.wholesalePrice ? p.wholesalePrice.toLocaleString() : '--'}</td>
                    <td>
                        <button class="btn btn-ghost btn-sm" onclick="editProduct('${p._id}')"><i class="fa fa-pen"></i></button>
                        <button class="btn btn-ghost btn-sm" onclick="deleteProduct('${p._id}')"><i class="fa fa-trash text-danger"></i></button>
                    </td>
                </tr>
                `;
            }).join('');
        }

        function openProductModal() {
            productVehicles = [];
            renderProductVehicles();
            document.getElementById('editProductId').value = '';
            document.getElementById('p_sku').value = '';
            document.getElementById('p_brand').value = '';
            document.getElementById('p_nameEn').value = '';
            document.getElementById('p_nameAr').value = '';
            if(globalCategories.length > 0) document.getElementById('p_category').value = globalCategories[0].en;
            document.getElementById('p_stock').value = '0';
            document.getElementById('p_price').value = '';
            document.getElementById('p_retailPrice').value = '';
            
            // clear tech specs
            ['p_typeEn','p_typeAr','p_positionEn','p_positionAr','p_oemRef','p_warrantyEn','p_warrantyAr','p_originEn','p_originAr'].forEach(id => document.getElementById(id).value = '');

            document.getElementById('p_image').value = '';
            document.getElementById('fileNameDisplay').textContent = 'Click to browse';
            document.getElementById('modalTitle').textContent = currentLang === 'ar' ? 'إضافة منتج' : 'Add Product';
            
            document.getElementById('productModal').classList.add('open');
        }

        function editProduct(id) {
            const p = allProducts.find(x => x._id === id);
            if(!p) return;
            
            productVehicles = p.vehicles || [];
            renderProductVehicles();
            
            document.getElementById('editProductId').value = p._id;
            document.getElementById('p_sku').value = p.sku;
            document.getElementById('p_brand').value = p.brand;
            document.getElementById('p_nameEn').value = p.nameEn;
            document.getElementById('p_nameAr').value = p.nameAr;
            document.getElementById('p_category').value = p.category || (globalCategories[0]?globalCategories[0].en:'');
            document.getElementById('p_stock').value = p.stock || 0;
            document.getElementById('p_price').value = p.wholesalePrice || '';
            document.getElementById('p_retailPrice').value = p.retailPrice || '';
            
            // Populate tech specs
            document.getElementById('p_typeEn').value = p.typeEn || '';
            document.getElementById('p_typeAr').value = p.typeAr || '';
            document.getElementById('p_positionEn').value = p.positionEn || '';
            document.getElementById('p_positionAr').value = p.positionAr || '';
            document.getElementById('p_oemRef').value = p.oemRef || '';
            document.getElementById('p_warrantyEn').value = p.warrantyEn || '';
            document.getElementById('p_warrantyAr').value = p.warrantyAr || '';
            document.getElementById('p_originEn').value = p.originEn || '';
            document.getElementById('p_originAr').value = p.originAr || '';

            document.getElementById('p_image').value = ''; // Don't enforce re-upload
            document.getElementById('fileNameDisplay').textContent = p.imageUrl ? p.imageUrl : 'Click to browse';

            document.getElementById('modalTitle').textContent = currentLang === 'ar' ? 'تعديل منتج' : 'Edit Product';
            document.getElementById('productModal').classList.add('open');
        }

        function closeModal() {
            document.getElementById('productModal').classList.remove('open');
        }

        async function saveProduct() {
            const id = document.getElementById('editProductId').value;
            const method = id ? 'PUT' : 'POST';
            const url = id ? 'http://localhost:5000/api/products/' + id : 'http://localhost:5000/api/products';
            
            const fd = new FormData();
            fd.append('sku', document.getElementById('p_sku').value);
            fd.append('brand', document.getElementById('p_brand').value);
            fd.append('nameEn', document.getElementById('p_nameEn').value);
            fd.append('nameAr', document.getElementById('p_nameAr').value);
            fd.append('category', document.getElementById('p_category').value);
            fd.append('stock', document.getElementById('p_stock').value || 0);
            fd.append('wholesalePrice', document.getElementById('p_price').value);
            fd.append('retailPrice', document.getElementById('p_retailPrice').value || 0);
            
            ['typeEn','typeAr','positionEn','positionAr','oemRef','warrantyEn','warrantyAr','originEn','originAr'].forEach(key => {
                fd.append(key, document.getElementById('p_' + key).value);
            });

            fd.append('vehicles', JSON.stringify(productVehicles));
            
            const fileInput = document.getElementById('p_image');
            if(fileInput.files.length > 0) {
                fd.append('image', fileInput.files[0]);
            }

            const btn = document.getElementById('btnSave');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i>';

            try {
                const res = await fetch(url, { method: method, body: fd });
                const json = await res.json();
                if(json.success) {
                    closeModal();
                    await fetchProducts();
                } else {
                    alert('Error: ' + json.message);
                }
            } catch(e) {
                alert('Connection error');
            }
            btn.disabled = false;
            btn.innerHTML = currentLang === 'ar' ? 'حفظ المنتج' : 'Save Product';
        }

        async function deleteProduct(id) {
            if(!confirm(currentLang === 'ar' ? 'هل أنت متأكد من مسح المنتج؟' : 'Are you sure you want to delete this product?')) return;
            
            try {
                const res = await fetch('http://localhost:5000/api/products/' + id, { method: 'DELETE' });
                const json = await res.json();
                if(json.success) {
                    await fetchProducts();
                } else {
                    alert('Error: ' + json.message);
                }
            } catch(e) {
                alert('Connection error');
            }
        }

        // --- Category Management ---
        function renderCategoryDropdown() {
            const select = document.getElementById('p_category');
            if(!select) return;
            select.innerHTML = globalCategories.map(c => `<option value="${c.en}">${currentLang === 'ar' ? c.ar : c.en}</option>`).join('');
        }

        function openCategoriesModal() {
            document.getElementById('categoriesModal').classList.add('open');
            renderCategoryList();
        }

        function closeCategoriesModal() {
            document.getElementById('categoriesModal').classList.remove('open');
            renderCategoryDropdown();
        }

        function renderCategoryList() {
            const tbody = document.getElementById('catsTbody');
            tbody.innerHTML = globalCategories.map(c => `
                <tr>
                    <td>${currentLang === 'ar' ? c.ar : c.en} <span style="color:var(--gray-500);font-size:0.8rem">(${currentLang === 'ar' ? c.en : c.ar})</span></td>
                    <td style="text-align:right">
                        <button class="btn btn-ghost btn-sm" onclick="deleteCategory('${c.id}')"><i class="fa fa-trash text-danger"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        async function addCategory() {
            const en = document.getElementById('newCatEn').value.trim();
            const ar = document.getElementById('newCatAr').value.trim();
            if(!en || !ar) { alert('Please fill both EN and AR names.'); return; }
            
            const id = 'cat_' + Date.now();
            globalCategories.push({ id, en, ar });
            
            document.getElementById('newCatEn').value = '';
            document.getElementById('newCatAr').value = '';
            
            await persistCategories();
            renderCategoryList();
        }

        async function deleteCategory(id) {
            if(!confirm('Delete this category?')) return;
            globalCategories = globalCategories.filter(c => c.id !== id);
            await persistCategories();
            renderCategoryList();
        }

        async function persistCategories() {
            try {
                await fetch('http://localhost:5000/api/settings/bulk', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ product_categories: globalCategories })
                });
            } catch(e) {
                console.error(e);
            }
        }

        let masterVehicles = [];
        let productVehicles = [];

        function openVehiclesModal() {
            document.getElementById('vehiclesModal').classList.add('open');
            renderVehiclesList();
        }

        function closeVehiclesModal() {
            document.getElementById('vehiclesModal').classList.remove('open');
        }

        function formatYearsLabel(years) {
            if (!years || years.length === 0) return '--';
            const numYears = years.map(Number).filter(y => !isNaN(y));
            if (numYears.length > 1) {
                return Math.min(...numYears) + ' - ' + Math.max(...numYears);
            }
            return years.join(', ');
        }

        function renderVehiclesList() {
            const tbody = document.getElementById('vehiclesTbody');
            if (masterVehicles.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:var(--gray-500);">No vehicles found</td></tr>';
                return;
            }
            tbody.innerHTML = masterVehicles.map(v => `
                <tr>
                    <td>${v.makeLogoUrl ? `<img src="http://localhost:5000${v.makeLogoUrl}" style="height:30px; object-fit:contain; background: white; border-radius: 4px; padding: 2px;">` : '<i class="fa fa-car text-muted"></i>'}</td>
                    <td>${currentLang === 'ar' ? (v.makeAr || v.make) : v.make}</td>
                    <td>${currentLang === 'ar' ? (v.modelAr || v.model) : v.model}</td>
                    <td><span style="font-size:0.8rem;color:var(--gray-400)">${formatYearsLabel(v.years)}</span></td>
                    <td style="text-align:right">
                        <button class="btn btn-ghost btn-sm" onclick="editVehicle('${v._id}')"><i class="fa fa-pen"></i></button>
                        <button class="btn btn-ghost btn-sm" onclick="deleteVehicle('${v._id}')"><i class="fa fa-trash text-danger"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        async function submitNewVehicle(e) {
            e.preventDefault();
            const btn = document.getElementById('btnAddVehicle');
            btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> <span data-en="Processing..." data-ar="جاري المعالجة..." id="btnAddVehicleText">...Processing</span>';
            btn.disabled = true;

            const vehicleId = document.getElementById('nvVehicleId').value;
            const method = vehicleId ? 'PUT' : 'POST';
            const url = vehicleId ? 'http://localhost:5000/api/vehicles/' + vehicleId : 'http://localhost:5000/api/vehicles';

            const formData = new FormData();
            formData.append('make', document.getElementById('nvMake').value.trim());
            formData.append('makeAr', document.getElementById('nvMakeAr').value.trim());
            formData.append('model', document.getElementById('nvModel').value.trim());
            formData.append('modelAr', document.getElementById('nvModelAr').value.trim());
            
            // Build the years array based on "from" and "to" inputs
            const yearFrom = parseInt(document.getElementById('nvYearFrom').value);
            const yearTo = parseInt(document.getElementById('nvYearTo').value);
            let yearsArr = [];
            if (!isNaN(yearFrom) && !isNaN(yearTo) && yearFrom <= yearTo) {
                for (let y = yearFrom; y <= yearTo; y++) {
                    yearsArr.push(y.toString());
                }
            } else if (!isNaN(yearFrom)) {
                yearsArr.push(yearFrom.toString());
            } else if (!isNaN(yearTo)) {
                yearsArr.push(yearTo.toString());
            }
            formData.append('years', JSON.stringify(yearsArr));

            const makeLogo = document.getElementById('nvMakeLogo').files[0];
            if(makeLogo) formData.append('makeLogo', makeLogo);

            const modelImg = document.getElementById('nvModelImage').files[0];
            if(modelImg) formData.append('modelImage', modelImg);

            try {
                const res = await fetch(url, {
                    method: method,
                    body: formData
                });
                const json = await res.json();
                if(json.success) {
                    document.getElementById('newVehicleForm').reset();
                    cancelEditVehicle();
                    await fetchMasterVehicles();
                    renderVehiclesList();
                } else {
                    alert('Error: ' + json.error);
                }
            } catch(err) {
                console.error(err);
                alert('Connection Error');
            }
            
            btn.innerHTML = '<i class="fa fa-plus"></i> <span data-en="Add Vehicle" data-ar="إضافة السيارة" id="btnAddVehicleText">' + (currentLang === 'ar' ? 'إضافة السيارة' : 'Add Vehicle') + '</span>';
            btn.disabled = false;
        }

        function editVehicle(id) {
            const v = masterVehicles.find(x => x._id === id);
            if(!v) return;
            document.getElementById('nvVehicleId').value = v._id;
            document.getElementById('nvMake').value = v.make || '';
            document.getElementById('nvMakeAr').value = v.makeAr || '';
            document.getElementById('nvModel').value = v.model || '';
            document.getElementById('nvModelAr').value = v.modelAr || '';
            
            let minYear = '';
            let maxYear = '';
            if (v.years && v.years.length > 0) {
                const numericYears = v.years.map(Number).filter(y => !isNaN(y));
                if (numericYears.length > 0) {
                    minYear = Math.min(...numericYears);
                    maxYear = Math.max(...numericYears);
                }
            }
            document.getElementById('nvYearFrom').value = minYear;
            document.getElementById('nvYearTo').value = maxYear;
            
            document.getElementById('btnAddVehicleText').textContent = currentLang === 'ar' ? 'تعديل السيارة' : 'Update Vehicle';
            document.getElementById('btnCancelEditVehicle').style.display = 'block';
        }

        function cancelEditVehicle() {
            document.getElementById('nvVehicleId').value = '';
            document.getElementById('newVehicleForm').reset();
            document.getElementById('btnAddVehicleText').textContent = currentLang === 'ar' ? 'إضافة السيارة' : 'Add Vehicle';
            document.getElementById('btnCancelEditVehicle').style.display = 'none';
        }

        async function deleteVehicle(id) {
            if(!confirm('Are you sure you want to delete this vehicle?')) return;
            try {
                const res = await fetch('http://localhost:5000/api/vehicles/' + id, { method: 'DELETE' });
                const json = await res.json();
                if(json.success) {
                    await fetchMasterVehicles();
                    renderVehiclesList();
                }
            } catch(e) {
                alert('Connection Error');
            }
        }

        async function fetchMasterVehicles() {
            try {
                const res = await fetch('http://localhost:5000/api/vehicles');
                const json = await res.json();
                if(json.success) { 
                    masterVehicles = json.data; 
                    populateMakeSelect(); 
                    
                    // Populate the datalist of existing makes
                    const makes = [...new Set(masterVehicles.map(v => v.make))];
                    const dl = document.getElementById('existingMakesList');
                    if(dl) dl.innerHTML = makes.map(m => `<option value="${m}"></option>`).join('');
                }
            } catch(e) { console.error('Error fetching master vehicles'); }
        }

        function populateMakeSelect() {
            const uniqueMakes = masterVehicles.filter((v, i, a) => a.findIndex(t => t.make === v.make) === i);
            const selMake = document.getElementById('p_vMake');
            selMake.innerHTML = `<option value="">Select Make...</option>` + uniqueMakes.map(m => {
                const display = currentLang === 'ar' ? (m.makeAr || m.make) : m.make;
                return `<option value="${m.make}">${display}</option>`;
            }).join('');
            document.getElementById('p_vModel').innerHTML = `<option value="">Select Model...</option>`;
            document.getElementById('p_vYearFrom').value = '';
            document.getElementById('p_vYearTo').value = '';
        }

        function loadModelsForMake() {
            const selectedMake = document.getElementById('p_vMake').value;
            const models = masterVehicles.filter(v => v.make === selectedMake);
            const selModel = document.getElementById('p_vModel');
            selModel.innerHTML = `<option value="">Select Model...</option>` + models.map(m => {
                const display = currentLang === 'ar' ? (m.modelAr || m.model) : m.model;
                return `<option value="${m.model}">${display}</option>`;
            }).join('');
            document.getElementById('p_vYearFrom').value = '';
            document.getElementById('p_vYearTo').value = '';
        }

        function loadYearsForModel() {
            const selectedMake = document.getElementById('p_vMake').value;
            const selectedModel = document.getElementById('p_vModel').value;
            const vehicle = masterVehicles.find(v => v.make === selectedMake && v.model === selectedModel);
            
            document.getElementById('p_vYearFrom').value = '';
            document.getElementById('p_vYearTo').value = '';
            
            if (vehicle && vehicle.years && vehicle.years.length > 0) {
                const numYears = vehicle.years.map(Number).filter(y => !isNaN(y));
                if (numYears.length > 0) {
                    document.getElementById('p_vYearFrom').value = Math.min(...numYears);
                    document.getElementById('p_vYearTo').value = Math.max(...numYears);
                }
            }
        }

        function addVehicleToProduct() {
            const make = document.getElementById('p_vMake').value;
            const model = document.getElementById('p_vModel').value;
            const yearFrom = document.getElementById('p_vYearFrom').value;
            const yearTo = document.getElementById('p_vYearTo').value;
            
            if(!make || !model) return alert("Please select Make and Model");
            
            let yearStr = "All";
            if (yearFrom && yearTo) {
                if (yearFrom === yearTo) yearStr = yearFrom;
                else yearStr = yearFrom + " - " + yearTo;
            } else if (yearFrom) {
                yearStr = yearFrom;
            } else if (yearTo) {
                yearStr = yearTo;
            }
            
            const exists = productVehicles.find(v => v.make === make && v.model === model && v.year === yearStr);
            if(exists) return;
            productVehicles.push({ make, model, year: yearStr });
            renderProductVehicles();
        }

        function removeVehicleFromProduct(make, model, year) {
            productVehicles = productVehicles.filter(v => !(v.make === make && v.model === model && v.year === year));
            renderProductVehicles();
        }

        function renderProductVehicles() {
            const container = document.getElementById('p_vehiclesList');
            container.innerHTML = productVehicles.map(v => {
                // Find appropriate Arabic names
                const ref = masterVehicles.find(x => x.make === v.make && x.model === v.model);
                const makeName = currentLang === 'ar' && ref && ref.makeAr ? ref.makeAr : v.make;
                const modelName = currentLang === 'ar' && ref && ref.modelAr ? ref.modelAr : v.model;
                return `
                <div style="background: rgba(34,197,94,0.15); color: var(--success); padding: 4px 10px; border-radius: var(--r-full); font-size: 0.8rem; border: 1px solid rgba(34,197,94,0.3); display: flex; align-items: center; gap: 6px;">
                    ${makeName} ${modelName} (${v.year})
                    <i class="fa fa-times" style="cursor: pointer; opacity: 0.7;" onclick="removeVehicleFromProduct('${v.make}', '${v.model}', '${v.year}')"></i>
                </div>
                `;
            }).join('');
        }

        window.addEventListener('languageChanged', (e) => {
            fetchProducts();
            renderCategoryDropdown();
        });

        document.addEventListener('DOMContentLoaded', () => {
            setLang(currentLang);
            fetchProducts();
            fetchMasterVehicles();
        });
    </script>
<script src="../js/shared.js"></script>
</body>
</html>
