<!DOCTYPE html>

    <style>
        .sidebar { background: #0c0c0c; border-right: 1px solid rgba(232, 35, 26, 0.3); }
        .sidebar-link.active, .sidebar-link:hover { background: rgba(232, 35, 26, 0.1); border-left: 3px solid var(--red); color: var(--red); }
        .sidebar-link.active .icon, .sidebar-link:hover .icon { color: var(--red); }
        
        /* CMS Visual Editor Layout */
        .portal-main { display: flex; flex-direction: column; height: 100vh; overflow: hidden; padding: 0 !important; }
        .portal-topbar { flex: 0 0 auto; margin-bottom: 0 !important; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .cms-builder-wrapper { display: flex; flex: 1; overflow: hidden; width: 100%; }
        
        .cms-builder-sidebar { flex: 0 0 450px; display: flex; flex-direction: column; background: var(--dark-2); border-right: 1px solid rgba(255,255,255,0.05); overflow: hidden; }
        .cms-nav-horizontal { display: flex; gap: 8px; flex-wrap: wrap; padding: 12px; background: var(--dark-3); border-bottom: 1px solid rgba(255,255,255,0.05); flex-shrink: 0; }
        .cms-menu-item { white-space: nowrap; padding: 8px 16px; color: var(--gray-400); font-size: 0.85rem; font-weight: 600; cursor: pointer; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); transition: 0.2s; display: flex; align-items: center; gap: 8px; }
        .cms-menu-item:hover { background: rgba(255,255,255,0.04); color: white; }
        .cms-menu-item.active { background: rgba(232,35,26,0.15); color: var(--red); border-color: rgba(232,35,26,0.3); }
        
        .cms-builder-content { flex: 1; overflow-y: auto; padding: 20px; }
        
        .cms-preview-pane { flex: 1; background: #0b0b0b; padding: 20px; display: flex; flex-direction: column; overflow: hidden; }
        .cms-iframe-container { flex: 1; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 0 30px rgba(0,0,0,0.8); }
        
        /* Accordion & Language Tools */
        .cms-lang-tabs { display: flex; margin-bottom: 20px; background: rgba(0,0,0,0.3); border-radius: 6px; padding: 4px; border: 1px solid rgba(255,255,255,0.05); }
        .cms-lang-tab { flex: 1; text-align: center; padding: 8px; font-size: 0.85rem; font-weight: 600; color: var(--gray-400); cursor: pointer; border-radius: 4px; transition: 0.2s; }
        .cms-lang-tab.active { background: var(--red); color: white; }
        
        .accordion-group { margin-bottom: 12px; background: rgba(0,0,0,0.2); border-radius: var(--r-md); border: 1px solid rgba(255,255,255,0.03); overflow: hidden; }
        .accordion-header { padding: 14px 16px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; color: var(--gray-200); font-weight: 600; font-size: 0.9rem; background: rgba(255,255,255,0.02); }
        .accordion-header:hover { background: rgba(255,255,255,0.05); }
        .accordion-content { padding: 0 16px; max-height: 0; overflow: hidden; transition: max-height 0.3s ease, padding 0.3s ease; }
        .accordion-group.open .accordion-content { padding: 16px; max-height: 3000px; }
        .accordion-group.open .accordion-header { border-bottom: 1px solid rgba(255,255,255,0.05); color: var(--red); }
        
        .cms-content-section { display: none; animation: fadeIn 0.3s ease; }
        .cms-content-section.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        @media(max-width: 1000px) {
            .cms-builder-wrapper { flex-direction: column; }
            .cms-builder-sidebar { flex: 1; border-right: none; border-bottom: 1px solid rgba(255,255,255,0.05); }
            .cms-preview-pane { display: none; /* Hide preview on mobile */ }

                    {

                        fields: [
                            { type: 'text', key: 'about_cta_label', labelEn: 'Section Label', labelAr: 'الوسم', localized: true },
                            { type: 'text', key: 'about_cta_title', labelEn: 'Section Title', labelAr: 'العنوان', localized: true },
                            { type: 'textarea', key: 'about_cta_desc', labelEn: 'Section Desc', labelAr: 'الوصف', localized: true },
                            { type: 'text', key: 'about_cta_btn1', labelEn: 'Button 1 Text', labelAr: 'زر 1', localized: true },
                            { type: 'text', key: 'about_cta_btn2', labelEn: 'Button 2 Text', labelAr: 'زر 2', localized: true }

            {
                id: 'catalog', icon: 'fa-box-open', titleEn: 'Catalog & Brands', titleAr: 'الكتالوج والماركات',
                groups: [
                    {
                        titleEn: 'Catalog Headers', titleAr: 'عناوين الكتالوج',
                        fields: [
                            { type: 'textarea', key: 'catalog_hero', labelEn: 'Main Catalog Description', labelAr: 'وصف الكتالوج الرئيسي', localized: true }
                        ]

                        titleEn: 'Borsehung Info', titleAr: 'معلومات بورسيهونج',

                        ]
                    },
                    {
                        titleEn: 'VIKA Tantivy Info', titleAr: 'معلومات ڤيكا',
                        fields: [

                        ]
                    },
                    {
                        titleEn: 'KDD Info', titleAr: 'معلومات KDD',
                        fields: [
                            { type: 'textarea', key: 'brand_kdd', labelEn: 'Brand Summary', labelAr: 'ملخص الماركة', localized: true }
                        ]
                    }
                ]
            }
        ];

        // Generator Engine
        function renderCMS() {
            const nav = document.getElementById('cmsNav');
            const sections = document.getElementById('cmsSections');
            
            cmsSchema.forEach((page, index) => {
                // Render Nav Item
                const navItem = document.createElement('div');
                navItem.className = 'cms-menu-item' + (index === 0 ? ' active' : '');
                navItem.innerHTML = '<div><i class="fa ' + page.icon + '" style="margin-right:8px; width:16px;"></i> <span data-en="'+page.titleEn+'" data-ar="'+page.titleAr+'"></span></div>';
                navItem.onclick = () => switchCMSPage(page.id, navItem);
                nav.appendChild(navItem);

                // Render Section
                const section = document.createElement('div');
                section.className = 'cms-content-section' + (index === 0 ? ' active' : '');
                section.id = 'cms-page-' + page.id;
                
                let html = '<h3 style="margin-bottom:20px; color:var(--white); font-size:1.1rem; border-bottom:1px solid rgba(255,255,255,0.05); padding-bottom:15px;"><i class="fa ' + page.icon + '" style="color:var(--red);"></i> <span data-en="'+page.titleEn+'" data-ar="'+page.titleAr+'"></span></h3>';
                
                page.groups.forEach((group, gIndex) => {
                    const isOpenClass = gIndex === 0 ? 'open' : '';
                    html += '<div class="accordion-group ' + isOpenClass + '">';
                    html += '<div class="accordion-header" onclick="this.parentElement.classList.toggle(\'open\')">';
                    html += '<span data-en="'+group.titleEn+'" data-ar="'+group.titleAr+'"></span>';
                    html += '<i class="fa fa-chevron-down" style="font-size:0.8rem; opacity:0.5;"></i>';
                    html += '</div>';
                    html += '<div class="accordion-content">';
                    
                    group.fields.forEach(f => {
                        if (f.localized) {
                            // EN
                            html += '<div class="cms-lang-en" style="margin-bottom:16px;">';
                            html += '<label style="display:block; margin-bottom:8px; font-size:0.85rem; color:var(--gray-300)">' + f.labelEn + ' (EN)</label>';
                            if (f.type === 'textarea') html += '<textarea dyn-setting id="'+f.key+'_en" class="form-control" rows="3" oninput="liveUpdate(this, \''+f.key+'\', \'en\')"></textarea>';
                            else html += '<input type="text" dyn-setting id="'+f.key+'_en" class="form-control" oninput="liveUpdate(this, \''+f.key+'\', \'en\')">';
                            html += '</div>';
                            // AR
                            html += '<div class="cms-lang-ar" style="margin-bottom:16px; display:none;">';
                            html += '<label style="display:block; margin-bottom:8px; font-size:0.85rem; color:var(--gray-300)">' + f.labelAr + ' (AR)</label>';
                            if (f.type === 'textarea') html += '<textarea dyn-setting id="'+f.key+'_ar" class="form-control" rows="3" dir="rtl" oninput="liveUpdate(this, \''+f.key+'\', \'ar\')"></textarea>';
                            else html += '<input type="text" dyn-setting id="'+f.key+'_ar" class="form-control" dir="rtl" oninput="liveUpdate(this, \''+f.key+'\', \'ar\')">';
                            html += '</div>';
                        } else {
                            html += '<div style="margin-bottom:16px">';
                            html += '<label style="display:block; margin-bottom:8px; font-size:0.85rem; color:var(--gray-300)" data-en="'+f.labelEn+'" data-ar="'+f.labelAr+'"></label>';
                            if (f.type === 'textarea') html += '<textarea dyn-setting id="'+f.key+'" class="form-control" rows="3" oninput="liveUpdate(this, \''+f.key+'\')"></textarea>';
                            else if (f.type === 'image') {
                                html += '<input type="hidden" dyn-setting id="'+f.key+'">';
                                html += '<div style="margin-bottom:8px;"><img id="preview_'+f.key+'" src="" style="max-height:50px;display:none;background:rgba(255,255,255,0.1);padding:4px;border-radius:4px;" /></div>';
                                html += '<input type="file" dyn-setting-file id="file_'+f.key+'" class="form-control" accept="image/*" onchange="previewImg(this, \''+f.key+'\')">';
                            }
                            else html += '<input type="'+f.type+'" dyn-setting id="'+f.key+'" class="form-control" oninput="liveUpdate(this, \''+f.key+'\')">';
                            html += '</div>';
                        }
                    });
                    
                    html += '</div></div>'; // end accordion content and group
                });
                
                section.innerHTML = html;
                sections.appendChild(section);
            });
        }

        function switchCMSPage(id, el) {
            document.querySelectorAll('.cms-menu-item').forEach(m => m.classList.remove('active'));
            el.classList.add('active');
            
            document.querySelectorAll('.cms-content-section').forEach(s => s.classList.remove('active'));
            document.getElementById('cms-page-' + id).classList.add('active');

            // Change iframe preview based on page
            const iframe = document.getElementById('livePreviewFrame');
            if (id === 'home' || id === 'global') iframe.src = '../index.html';
            else if (id === 'about') iframe.src = '../about.html';
            else if (id === 'catalog') iframe.src = '../catalog.html';
            else if (id === 'brands') iframe.src = '../brands.html';
        }

        // Live Update Dispatcher
        function liveUpdate(input, key, lang) {
            const iframe = document.getElementById('livePreviewFrame');
            if(iframe && iframe.contentWindow) {
                iframe.contentWindow.postMessage({ type: 'cms-update', key: key, value: input.value, lang: lang }, '*');
            }
        }
        
        function reloadPreview() {
            const iframe = document.getElementById('livePreviewFrame');
            iframe.src = iframe.src;
        }

        // Bilingual Toggle logic
        function toggleCMSLang(lang) {
            document.getElementById('tabLangEN').classList.toggle('active', lang === 'en');
            document.getElementById('tabLangAR').classList.toggle('active', lang === 'ar');
            
            document.querySelectorAll('.cms-lang-en').forEach(el => el.style.display = lang === 'en' ? 'block' : 'none');
            document.querySelectorAll('.cms-lang-ar').forEach(el => el.style.display = lang === 'ar' ? 'block' : 'none');
        }

        function previewImg(input, key) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const pv = document.getElementById('preview_' + key);
                    pv.src = e.target.result;
                    pv.style.display = 'block';
                    // Optional: Live update for images
                    liveUpdate({value: e.target.result}, key);
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        let currentLang = localStorage.getItem('lang') || 'en';

        function setLang(lang) {
            currentLang = lang;
            localStorage.setItem('lang', lang);
            document.documentElement.lang = lang;
            document.body.classList.toggle('lang-ar', lang === 'ar');
            document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
            document.getElementById('btn-ar').classList.toggle('active', lang === 'ar');
            document.querySelectorAll('[data-en]').forEach(el => {
                const t = el.getAttribute('data-' + lang);
                if (t && t !== 'undefined') el.innerHTML = t;
            });
        }

        async function fetchSettings() {
            try {
                const res = await fetch('http://localhost:5000/api/settings');
                const json = await res.json();
                if(json.success && json.data) {
                    const inputs = document.querySelectorAll('[dyn-setting]');
                    inputs.forEach(input => {
                        if(json.data[input.id] !== undefined) {
                            input.value = json.data[input.id];
                            if(input.tagName === 'INPUT' && input.type === 'hidden') {
                                const pv = document.getElementById('preview_' + input.id);
                                if(pv && input.value) { pv.src = input.value; pv.style.display = 'block'; }
                            }
                        }
                    });
                }
                
                // Pending orders badge loop
                const ordRes = await fetch('http://localhost:5000/api/orders?status=Pending');
                const ordJson = await ordRes.json();
                if(ordJson.success) {
                    document.getElementById('adminPendingBadge').textContent = ordJson.data.length;
                }
            } catch(e) {
                console.error(e);
            }
        }

        async function saveSettings(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSave');
            const originalContent = btn.innerHTML;
            btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i>';
            btn.disabled = true;

            // Handle Image Uploads first
            const fileInputs = document.querySelectorAll('[dyn-setting-file]');
            for(let fi of fileInputs) {
                if(fi.files && fi.files.length > 0) {
                    const fd = new FormData();
                    fd.append('image', fi.files[0]);
                    try {
                        const upRes = await fetch('http://localhost:5000/api/settings/upload', {
                            method: 'POST',
                            body: fd
                        });
                        const upJson = await upRes.json();
                        if(upJson.success) {
                            const actualKey = fi.id.replace('file_', '');
                            document.getElementById(actualKey).value = upJson.url;
                        }
                    } catch(e) { console.error('Upload failed', e); }
                }
            }

            const inputs = document.querySelectorAll('[dyn-setting]');
            const payload = {};
            inputs.forEach(input => {
                if(input.id && input.value.trim() !== '') {
                    payload[input.id] = input.value;
                }
            });

            try {
                const res = await fetch('http://localhost:5000/api/settings/bulk', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const json = await res.json();
                if(json.success) {
                    // Show beautiful save success visually rather than an alert
                    btn.innerHTML = '<i class="fa fa-check"></i> ' + (currentLang === 'ar' ? 'تم الحفظ والرفع للموقع بنجاح!' : 'Published Successfully!');
                    btn.style.background = '#22c55e';
                    setTimeout(() => {
                        btn.innerHTML = originalContent;
                        btn.style.background = '';
                        btn.disabled = false;
                    }, 3000);
                } else {
                    alert('Error: ' + json.message);
                    btn.innerHTML = originalContent;
                    btn.disabled = false;
                }
            } catch(e) {
                alert('Connection error');
                btn.innerHTML = originalContent;
                btn.disabled = false;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderCMS(); // Build the UI
            setLang(currentLang); // Apply Language
            fetchSettings(); // Fill forms
        });
    </script>
</body>
